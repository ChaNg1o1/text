name: Build Desktop App Artifacts

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: ubuntu-22.04
          - os: windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/tf-features -> target
            web/src-tauri -> target

      - name: Install Python dependencies
        run: |
          python -m pip install -e ".[desktop]"
          python -m pip install maturin pyinstaller

      - name: Build Rust extension
        run: maturin develop --release

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Build desktop bundles
        shell: bash
        run: bash scripts/release/build_desktop_bundle.sh

      - name: Upload desktop bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-bundle-${{ matrix.os }}
          path: web/src-tauri/target/release/bundle
          if-no-files-found: error
